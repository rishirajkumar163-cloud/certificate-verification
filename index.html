<!DOCTYPE html>
<html>

<head>

<title>ISSC 2026 Certificate Verification</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="header">

<img src="logo.png"
alt="Go4Guru">

<h1>ISSC 2026</h1>

</div>

<div class="page-title">

ISSC Certificate Verification

</div>

<div class="card">

<div class="status">

✅ Certificate Verified

</div>

<div class="row">

<span class="label">

Student Name:

</span>

<span class="value"
id="name"></span>

</div>

<div class="row">

<span class="label">

Standard:

</span>

<span class="value"
id="class"></span>

</div>

<div class="row">

<span class="label">

School:

</span>

<span class="value"
id="school"></span>

</div>

<div class="row">

<span class="label">

Exam:

</span>

<span class="value">

ISSC 2026

</span>

</div>

<div class="row">

<span class="label">

Award:

</span>

<span class="value">

ISSC BEST PERFORMER

</span>

</div>

<div class="row">

<span class="label">

Reference ID:

</span>

<span class="value"
id="ref"></span>

</div>

</div>

<div class="footer">

<hr>

Go4Guru Inc. USA

<br>

<a href="https://www.go4guru.com/issc2026"
target="_blank">

https://www.go4guru.com/issc2026

</a>

</div>

<script type="module"
src="script.js"></script>

</body>

</html>
